<script>
const D=JSON.parse(document.getElementById('data').textContent);
const u8=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
document.getElementById('p').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
async function go(){
  const pwd=document.getElementById('p').value, b=document.getElementById('b'), er=document.getElementById('e');
  if(!pwd) return;
  b.disabled=true; er.textContent='';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:u8(D.s),iterations:250000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:u8(D.i)},key,u8(D.c));
    const html=new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  }catch(err){ er.textContent='Mot de passe incorrect.'; b.disabled=false; }
}
<\/script>
